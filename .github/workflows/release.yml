name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o wterm-linux-amd64 .

      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o wterm-linux-arm64 .

      - name: Build macOS amd64
        run: GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o wterm-darwin-amd64 .

      - name: Build macOS arm64
        run: GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o wterm-darwin-arm64 .

      - name: Build Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o wterm-windows-amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            wterm-linux-amd64
            wterm-linux-arm64
            wterm-darwin-amd64
            wterm-darwin-arm64
            wterm-windows-amd64.exe
          generate_release_notes: true
