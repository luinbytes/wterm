name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: warp-clone
            asset_name: warp-clone-linux-amd64.tar.gz
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact_name: warp-clone
            asset_name: warp-clone-linux-arm64.tar.gz
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact_name: warp-clone
            asset_name: warp-clone-darwin-amd64.tar.gz
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_name: warp-clone
            asset_name: warp-clone-darwin-arm64.tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: warp-clone.exe
            asset_name: warp-clone-windows-amd64.zip
          - os: windows-latest
            goos: windows
            goarch: arm64
            artifact_name: warp-clone.exe
            asset_name: warp-clone-windows-arm64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod tidy && go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o ${{ matrix.artifact_name }} .

      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        run: tar -czvf ${{ matrix.asset_name }} ${{ matrix.artifact_name }}

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: 7z a ${{ matrix.asset_name }} ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
