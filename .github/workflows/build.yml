name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: wterm
            archive_name: wterm-linux-amd64.tar.gz
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact_name: wterm
            archive_name: wterm-linux-arm64.tar.gz
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact_name: wterm
            archive_name: wterm-darwin-amd64.tar.gz
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_name: wterm
            archive_name: wterm-darwin-arm64.tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: wterm.exe
            archive_name: wterm-windows-amd64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod tidy && go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o ${{ matrix.artifact_name }} .

      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        run: tar -czvf ${{ matrix.archive_name }} ${{ matrix.artifact_name }}

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: 7z a ${{ matrix.archive_name }} ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}
          retention-days: 7
